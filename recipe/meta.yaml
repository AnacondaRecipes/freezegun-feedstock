{% set version = "1.5.5" %}
{% set name = "freezegun" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ac7742a6cc6c25a2c35e9292dfd554b897b517d2dec26891a2e8debf205cb94a

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  skip: true  # [py<38]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - python-dateutil >=2.7

{% set deselect_tests = "" %}
# AttributeError: module 'time' has no attribute 'tzset' (it is not available on Windows)
{% set deselect_tests = " --deselect=tests/test_datetimes.py::test_compare_datetime_and_time_with_timezone" %}  # [win]
# >       db = sqlite3.connect("/tmp/foo")
            #  ^^^^^^^^^^^^^^^^^^^^^^^^^^^
# E       sqlite3.OperationalError: unable to open database file
{% set deselect_tests = deselect_tests + " --deselect=tests/test_sqlite3.py::test_fake_datetime_select" %}  # [win]
{% set deselect_tests = deselect_tests + " --deselect=tests/test_sqlite3.py::test_fake_date_select" %}  # [win]

test:
  source_files:
    - tests
  imports:
    - freezegun
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v {{ deselect_tests }} tests
  requires:
    - pip
    - pytest

about:
  home: https://github.com/spulec/freezegun
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Let your Python tests travel through time
  description: |
    FreezeGun is a library that allows your Python tests to
    travel through time by mocking the datetime module.
  dev_url: https://github.com/spulec/freezegun
  doc_url: https://github.com/spulec/freezegun

extra:
  recipe-maintainers:
    - ocefpaf
